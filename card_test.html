<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Card Frame Prototype</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0a0a14;
    font-family: 'Noto Serif KR', Georgia, serif;
    color: #fff;
    padding: 30px;
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ───── CARD BASE ───── */
  .card {
    position: relative;
    width: 340px;              /* display size */
    aspect-ratio: 1024 / 1536;  /* native frame ratio */
    user-select: none;
  }

  /* 1) Illustration (bottom layer, inside arch window) */
  /* measured: arch x=22..78% y=19..69% (frame banner ends ~14%, panel starts ~75%) */
  .card .illust {
    position: absolute;
    left: 22%;
    top: 19%;
    width: 56%;
    height: 50%;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
  }

  /* 2) Frame overlay (sits above illustration) */
  .card .frame {
    position: absolute;
    inset: 0;
    background-size: 100% 100%;
    pointer-events: none;
  }
  .card[data-frame="red"] .frame     { background-image: url('img/frame_red.png'); }
  .card[data-frame="purple"] .frame  { background-image: url('img/frame_purple.png'); }

  /* 3) Stat overlays (above frame) */
  .card .slot {
    position: absolute;
    font-weight: 700;
    text-shadow: 0 1px 3px #000, 0 0 6px #000;
    color: #fff;
    font-family: 'Cinzel', Georgia, serif;
    pointer-events: none;
    z-index: 3;
  }

  /* HP — upper-right heart gem */
  .card .slot-hp {
    right: 6.5%;
    top: 9.3%;
    width: 13%;
    height: 7%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    color: #fff;
    font-weight: 800;
  }

  /* NRG — lower-right diamond gem */
  .card .slot-nrg {
    right: 6.5%;
    bottom: 19.5%;
    width: 13%;
    height: 6%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.25rem;
    color: #fff;
    font-weight: 800;
  }

  /* ATK / DEF / SPD — left vertical column */
  .card .slot-atk,
  .card .slot-def,
  .card .slot-spd {
    left: 3.5%;
    width: 8.5%;
    height: 6%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem;
    font-weight: 800;
    color: #fff;
  }
  .card .slot-atk { top: 21.5%; }
  .card .slot-def { top: 30.8%; }
  .card .slot-spd { top: 40.2%; }

  /* Name — top banner plate (y≈8-14% of frame) */
  .card .slot-name {
    left: 18%;
    right: 18%;
    top: 9%;
    height: 5%;
    text-align: center;
    font-size: 0.95rem;
    letter-spacing: 1px;
    color: #f4e4a0;
    font-weight: 700;
    text-shadow: 0 1px 2px #000;
    display: flex; align-items: center; justify-content: center;
    white-space: nowrap;
    overflow: hidden;
  }

  /* Description — bottom stone panel (y≈82-94% of frame) */
  .card .slot-desc {
    left: 10%;
    right: 10%;
    bottom: 4.5%;
    height: 11%;
    text-align: center;
    font-size: 0.82rem;
    line-height: 1.3;
    color: #f0e8d0;
    text-shadow: 0 1px 2px #000, 0 0 4px rgba(0,0,0,0.9);
    font-family: 'Noto Serif KR', serif;
    font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    padding: 0 6px;
  }

  /* ───── DEBUG MARKERS (toggle with body.debug) ───── */
  body.debug .card .slot { outline: 1px dashed #0f0; background: rgba(0,255,0,0.1); }
  body.debug .card .illust { outline: 2px solid cyan; }

  /* label under each card */
  .lbl { text-align: center; margin-top: 8px; color: #888; font-size: 12px; font-family: monospace; }
</style>
</head>
<body>

<div>
  <div class="card" data-frame="red">
    <div class="illust" style="background-image:url('img/berserker.png');"></div>
    <div class="frame"></div>
    <div class="slot slot-name">광전사</div>
    <div class="slot slot-hp">28</div>
    <div class="slot slot-atk">8</div>
    <div class="slot slot-def">2</div>
    <div class="slot slot-spd">5</div>
    <div class="slot slot-nrg">3</div>
    <div class="slot slot-desc">[패시브] 광기: HP 50% 이하 시 공격 2배</div>
  </div>
  <div class="lbl">red frame / berserker</div>
</div>

<div>
  <div class="card" data-frame="purple">
    <div class="illust" style="background-image:url('img/h_s_fire.png');"></div>
    <div class="frame"></div>
    <div class="slot slot-name">화염의 대행자</div>
    <div class="slot slot-hp">28</div>
    <div class="slot slot-atk">6</div>
    <div class="slot slot-def">2</div>
    <div class="slot slot-spd">5</div>
    <div class="slot slot-nrg">12</div>
    <div class="slot slot-desc">[액티브] 화염: 적 전체 3 데미지 (에너지 4)</div>
  </div>
  <div class="lbl">purple frame / h_s_fire</div>
</div>

<div>
  <div class="card" data-frame="red">
    <div class="illust" style="background-image:url('img/h_m_dark.png');"></div>
    <div class="frame"></div>
    <div class="slot slot-name">암흑 전사</div>
    <div class="slot slot-hp">45</div>
    <div class="slot slot-atk">8</div>
    <div class="slot slot-def">5</div>
    <div class="slot slot-spd">3</div>
    <div class="slot slot-nrg">3</div>
    <div class="slot slot-desc">[패시브 50%] 생명흡수: 피해 100% 회복</div>
  </div>
  <div class="lbl">red frame / h_m_dark</div>
</div>

<div>
  <div class="card" data-frame="purple">
    <div class="illust" style="background-image:url('img/archmage.png');"></div>
    <div class="frame"></div>
    <div class="slot slot-name">대마법사</div>
    <div class="slot slot-hp">18</div>
    <div class="slot slot-atk">9</div>
    <div class="slot slot-def">1</div>
    <div class="slot slot-spd">7</div>
    <div class="slot slot-nrg">15</div>
    <div class="slot slot-desc">[액티브] 아케인폭풍: 전체 5데미지</div>
  </div>
  <div class="lbl">purple frame / archmage</div>
</div>

<script>
  // Ctrl+D to toggle debug outlines
  document.addEventListener('keydown', e => {
    if (e.key === 'd' || e.key === 'D') document.body.classList.toggle('debug');
  });
</script>
</body>
</html>
