<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>주인공 생성 — v3: Radial Soulform</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0704; --panel:#1f140a; --panel-hi:#2b1c13;
    --ink:#f1e4c3; --muted:#b89968; --dim:#6e4a2a;
    --gold:#d4a84a; --gold-lo:#8b6914; --gold-hi:#f1d890; --curr-gold:#e8bd4a;
    --border:#9b7a3e; --border-dk:#6e4a2a;
    --el-fire:#e74c3c; --el-water:#3498db; --el-lightning:#f1c40f;
    --el-earth:#8b5a2b; --el-dark:#8e44ad; --el-holy:#ffd700;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans KR',sans-serif;}
  body{width:1280px;height:720px;overflow:hidden;position:relative}

  /* ── 배경: 마법진 + 비네트 ── */
  body::before{content:'';position:absolute;inset:0;background:
    radial-gradient(55% 65% at 50% 50%, rgba(241,196,15,.14), transparent 70%),
    radial-gradient(100% 80% at 50% 100%, rgba(0,0,0,.7), transparent);pointer-events:none}
  body::after{content:'';position:absolute;top:50%;left:50%;width:640px;height:640px;transform:translate(-50%,-50%);
    border-radius:50%;
    border:1px dashed rgba(212,168,74,.18);
    box-shadow:inset 0 0 0 90px transparent, inset 0 0 0 92px rgba(212,168,74,.08);
    pointer-events:none;animation:spin 80s linear infinite}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}

  header{position:absolute;top:22px;left:0;right:0;text-align:center;z-index:3}
  .kicker{font:700 10px/1 'Cinzel';color:var(--muted);letter-spacing:.28em;text-transform:uppercase}
  h1{margin:4px 0 0;font:900 22px/1.1 'Cinzel Decorative',serif;color:var(--curr-gold);letter-spacing:.06em;text-shadow:0 3px 8px rgba(0,0,0,.9)}

  /* ── 중앙 대형 실루엣 카드 ── */
  .soul{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:300px;height:546px;border-radius:10px;overflow:hidden;
    background:#000;box-shadow:0 18px 48px rgba(0,0,0,.9), 0 0 0 2px var(--gold), 0 0 60px rgba(241,196,15,.22);z-index:2}
  .soul .art{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .soul .fx{position:absolute;inset:0;background:
    radial-gradient(60% 60% at 50% 40%, rgba(241,196,15,.35), transparent 62%);
    mix-blend-mode:screen;pointer-events:none;animation:pulse 3.2s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.55}}
  .soul .nmtag{position:absolute;left:8px;right:8px;bottom:8px;padding:10px 12px;background:rgba(26,15,8,.92);border:1px solid var(--border);border-radius:3px;text-align:center}
  .soul .nmtag .r{font:700 9px/1 'Cinzel';color:var(--muted);letter-spacing:.2em;text-transform:uppercase}
  .soul .nmtag .n{font:900 16px/1 'Cinzel Decorative','Noto Serif KR';color:var(--curr-gold);letter-spacing:.04em;margin-top:4px}

  /* ── 성별 토글 (상단 중앙) ── */
  .gender-toggle{position:absolute;top:110px;left:50%;transform:translateX(-50%);display:flex;background:var(--panel);border:1.5px solid var(--border);border-radius:24px;padding:4px;z-index:3}
  .gender-toggle button{font:900 11px/1 'Cinzel';letter-spacing:.18em;text-transform:uppercase;padding:10px 22px;border-radius:20px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
  .gender-toggle button.sel{background:linear-gradient(180deg,var(--gold-hi),var(--gold-lo));color:#2a1a08}

  /* ── 좌측 역할 (세로 3) ── */
  .role-col{position:absolute;left:56px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:14px;z-index:3}
  .role-col .rl{display:flex;align-items:center;gap:12px;padding:14px 16px;background:linear-gradient(90deg,var(--panel),rgba(31,20,10,.3));border:1.5px solid var(--border-dk);border-right:none;border-radius:3px 0 0 3px;cursor:pointer;width:240px;transition:all .2s}
  .role-col .rl:hover{border-color:var(--gold)}
  .role-col .rl.sel{border-color:var(--gold-hi);background:linear-gradient(90deg,rgba(212,168,74,.22),rgba(31,20,10,.2))}
  .role-col .rl .ic{font-size:26px;width:34px;text-align:center}
  .role-col .rl .nm{font:900 14px/1.1 'Cinzel Decorative',serif;color:var(--curr-gold);letter-spacing:.03em}
  .role-col .rl .dc{font:400 10px/1.3 'Noto Serif KR';color:#c8b285;font-style:italic;margin-top:3px}

  /* ── 우측 원소 (세로 6) ── */
  .elem-col{position:absolute;right:56px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;z-index:3}
  .elem-col .el{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border:1.5px solid var(--border-dk);border-left:none;border-radius:0 3px 3px 0;cursor:pointer;width:200px;transition:all .2s}
  .elem-col .el:hover{border-color:var(--gold)}
  .elem-col .el.sel{border-color:var(--gold-hi);background:linear-gradient(90deg,rgba(31,20,10,.2),rgba(212,168,74,.22))}
  .elem-col .el .ic{font-size:20px;width:26px;text-align:center}
  .elem-col .el .nm{font:900 12px/1 'Cinzel';color:var(--curr-gold);letter-spacing:.08em;flex:1}
  .elem-col .el .bn{font:400 9.5px/1 'Noto Sans KR';color:#c8b285}

  /* ── 하단 확정 버튼 ── */
  .seal{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:3}
  .seal button{font:900 13px/1 'Cinzel';letter-spacing:.2em;text-transform:uppercase;padding:16px 54px;background:linear-gradient(180deg,var(--gold-hi),var(--gold-lo));color:#2a1a08;border:1.5px solid var(--gold-hi);cursor:pointer;border-radius:3px;box-shadow:0 0 40px rgba(241,216,144,.3),0 6px 18px rgba(0,0,0,.6);transition:all .2s}
  .seal button:hover{box-shadow:0 0 60px rgba(241,216,144,.5),0 10px 28px rgba(0,0,0,.7)}
  .seal .sig{margin-top:8px;font:400 11px/1.4 'Noto Serif KR';color:var(--muted);font-style:italic;text-align:center}
  .seal .sig b{color:var(--curr-gold);font-weight:900;font-style:normal}
</style>
</head>
<body>

  <header>
    <div class="kicker">The Forging of Souls</div>
    <h1>운명의 문 앞에서</h1>
  </header>

  <div class="gender-toggle">
    <button class="sel">남성</button>
    <button>여성</button>
  </div>

  <div class="role-col">
    <div class="rl sel">
      <div class="ic">⚔️</div>
      <div><div class="nm">근접 전사</div><div class="dc">검은 대지의 수호자</div></div>
    </div>
    <div class="rl">
      <div class="ic">🏹</div>
      <div><div class="nm">원거리 궁수</div><div class="dc">바람의 사냥꾼</div></div>
    </div>
    <div class="rl">
      <div class="ic">🔮</div>
      <div><div class="nm">지원 마법사</div><div class="dc">정령과 속삭이는 자</div></div>
    </div>
  </div>

  <div class="soul">
    <img class="art" src="../../img/protagonist_m_warrior_1.png" alt="">
    <div class="fx"></div>
    <div class="nmtag">
      <div class="r">Lv 1 · Human</div>
      <div class="n">번개의 검사</div>
    </div>
  </div>

  <div class="elem-col">
    <div class="el"><div class="ic">🔥</div><div class="nm">불</div><div class="bn">+atk</div></div>
    <div class="el"><div class="ic">💧</div><div class="nm">물</div><div class="bn">+hp</div></div>
    <div class="el sel"><div class="ic">⚡</div><div class="nm">전기</div><div class="bn">+spd</div></div>
    <div class="el"><div class="ic">🌿</div><div class="nm">땅</div><div class="bn">+def</div></div>
    <div class="el"><div class="ic">🌑</div><div class="nm">암흑</div><div class="bn">+luck</div></div>
    <div class="el"><div class="ic">✨</div><div class="nm">신성</div><div class="bn">+nrg</div></div>
  </div>

  <div class="seal">
    <button>영혼을 각인한다</button>
    <div class="sig">남성 · 근접 전사 · <b>전기</b> — 운명의 인장이 새겨진다</div>
  </div>

</body>
</html>
