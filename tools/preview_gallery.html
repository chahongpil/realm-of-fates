<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<title>스펠·유물 이미지 이식 검수</title>
<style>
:root{
  --bg:#120f0c;--panel:#1a1512;--ink:#f1e4c3;--muted:#b89968;
  --gold:#e8bd4a;--border:#6e4a2a;
  --brz:#b8b8c0;--slv:#3a7bd5;--gld:#9b59b6;--leg:#f39c12;--div:#e8bd4a;
  --ok:#7dd37b;--warn:#e8a84a;--new:#5ab9ff;--miss:#e06a6a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:system-ui,'Noto Sans KR',sans-serif}
body{padding:28px 40px 80px}
h1{font-size:22px;color:var(--gold);margin:0 0 4px;letter-spacing:.04em}
.lead{color:var(--muted);margin:0 0 20px;font-size:13px;line-height:1.6}
.stats{display:inline-flex;gap:14px;padding:6px 14px;background:#2b1c13;border:1px solid var(--border);border-radius:3px;font-size:11px;margin-bottom:16px;color:var(--muted)}
.stats b{color:var(--gold);font-weight:700}
.legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-bottom:24px;flex-wrap:wrap}
.legend .tag{display:inline-flex;align-items:center;gap:5px}
.legend .dot{width:8px;height:8px;border-radius:50%}
h2{color:var(--gold);font-size:15px;letter-spacing:.08em;margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
h3{color:#d8c48a;font-size:12px;margin:16px 0 8px;opacity:.85;letter-spacing:.05em}
.grid{display:grid;grid-template-columns:repeat(auto-fill, 200px);gap:20px 14px}
figure{margin:0;display:flex;flex-direction:column;gap:4px;position:relative}
.frame{
  width:200px;height:300px;border-radius:4px;overflow:hidden;position:relative;
  background-image:
    linear-gradient(45deg,#2a1f18 25%,transparent 25%),
    linear-gradient(-45deg,#2a1f18 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#2a1f18 75%),
    linear-gradient(-45deg,transparent 75%,#2a1f18 75%);
  background-size:14px 14px;
  background-position:0 0,0 7px,7px -7px,-7px 0;
  background-color:#3a2c22;
}
.frame.brz{border:2px solid var(--brz)}
.frame.slv{border:3px solid var(--slv)}
.frame.gld{border:3px solid var(--gld)}
.frame.leg{border:4px solid var(--leg)}
.frame.div{border:4px solid var(--div);box-shadow:0 0 6px rgba(255,255,255,.85),0 0 14px rgba(255,255,255,.45)}
.frame img{width:100%;height:100%;object-fit:contain;display:block}
.frame .miss{display:flex;align-items:center;justify-content:center;height:100%;color:var(--miss);font-size:11px;text-align:center;padding:20px}
.frame.is-missing{border-color:var(--miss)!important;border-style:dashed}
.label{font-size:11px;color:#d8c48a;line-height:1.35}
.label .name{font-weight:600;color:#fff}
.label .meta{color:var(--muted);font-size:10px;margin-top:2px}
.label .desc{color:#bfa677;font-size:10px;margin-top:3px;line-height:1.4;max-height:2.6em;overflow:hidden}
.label .id{font-family:Consolas,monospace;color:#8aa98a;font-size:9px;opacity:.7}
.badge{position:absolute;top:5px;right:5px;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.05em;line-height:1.4}
.badge.ok{background:rgba(125,211,123,.2);color:var(--ok);border:1px solid var(--ok)}
.badge.new{background:rgba(90,185,255,.2);color:var(--new);border:1px solid var(--new)}
.badge.miss{background:rgba(224,106,106,.2);color:var(--miss);border:1px solid var(--miss)}
.badge.placeholder{background:rgba(232,168,74,.2);color:var(--warn);border:1px solid var(--warn)}
.chip{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;margin-right:3px;color:#fff}
.chip.brz{background:var(--brz);color:#000}
.chip.slv{background:var(--slv)}
.chip.gld{background:var(--gld)}
.chip.leg{background:var(--leg);color:#000}
.chip.active{background:#d43b5a}
.chip.passive{background:#2d5a88}
hr{border:none;border-top:1px solid var(--border);margin:28px 0 0}
</style></head>
<body>
<h1>스펠·유물 이미지 이식 검수 (2026-04-21)</h1>
<p class="lead">
런타임에 <code>12_data_skills.js</code> / <code>13_data_relics.js</code> 를 로드해 실제 데이터와 1:1 대응.<br>
각 카드 테두리색 = 등급 (브론즈/실버/골드/전설). 우상단 배지 = 이미지 이식 상태.
</p>

<div class="stats">전체 <b id="stat-total">-</b> · 이식완료 <b id="stat-ok">-</b> · 이번세션 신규 <b id="stat-new">-</b> · 이미지 없음 <b id="stat-miss">-</b></div>

<div class="legend">
  <span class="tag"><span class="badge ok">OK</span> PNG 이식 완료</span>
  <span class="tag"><span class="badge new">NEW</span> 이번 세션 신규 이식</span>
  <span class="tag"><span class="badge placeholder">SVG</span> game-icons.net fallback</span>
  <span class="tag"><span class="badge miss">MISS</span> 이미지 없음 (아이콘만)</span>
</div>

<section id="render-root"></section>

<!-- 데이터 로드 -->
<script>window.RoF = { Data: {} };</script>
<script src="../js/12_data_skills.js"></script>
<script src="../js/13_data_relics.js"></script>
<script>
(function(){
  const FROZEN_THIS_SESSION = new Set([
    // 스펠 이번 세션 이식 (40장)
    'sk_berserk','sk_shadowstep','sk_prayer','sk_power','sk_earth_bulwark',
    'sk_invincible','sk_reflex','sk_shield','sk_thunder_arrow','sk_chain_lightning',
    'sk_resurrection','sk_revive','sk_rage','sk_ironwill','sk_flame_arrow',
    'sk_warhorn','sk_aura','sk_godslayer','sk_dark_curse','sk_cleave',
    'sk_evasion','sk_tough','sk_focus','sk_execute','sk_fortress',
    'sk_transcend','sk_blessing_light','sk_healing_light','sk_tidal_crash',
    'sk_bloodlust','sk_swift','sk_handoff','sk_energize',
    'sk_mirage','sk_heal','sk_inferno_blast',
    // 이번 세션 신규 4종
    'sk_boil','sk_minor_curse','sk_spark_blast','sk_herb_pack',
    // 유물 이번 세션 신규
    'rl_fury','rl_boots'
  ]);

  const RARITY_CLASS = {bronze:'brz',silver:'slv',gold:'gld',legendary:'leg',divine:'div'};
  const RARITY_NAME  = {bronze:'일반',silver:'희귀',gold:'고귀한',legendary:'전설의',divine:'신'};

  // 통계
  let total=0, ok=0, news=0, miss=0;

  function checkImage(url){
    return new Promise(resolve=>{
      const img=new Image();
      img.onload=()=>resolve(true);
      img.onerror=()=>resolve(false);
      img.src=url;
    });
  }

  async function renderCard(item, isRelic){
    const id=item.id;
    const rarity=item.rarity||'bronze';
    const rcls=RARITY_CLASS[rarity]||'brz';
    const rname=RARITY_NAME[rarity]||rarity;
    const imgUrl=`../img/${id}.png`;
    const exists=await checkImage(imgUrl);
    total++;

    let badge='';
    if(FROZEN_THIS_SESSION.has(id)) { badge='<span class="badge new">NEW</span>'; news++; ok++; }
    else if(exists) { badge='<span class="badge ok">OK</span>'; ok++; }
    else if(isRelic && ['rl_banner','rl_crystal','rl_wall','rl_cloak'].includes(id)) { badge='<span class="badge placeholder">SVG</span>'; miss++; }
    else { badge='<span class="badge miss">MISS</span>'; miss++; }

    const imgHtml = exists
      ? `<img src="${imgUrl}" loading="lazy">`
      : `<div class="miss">${item.icon||'?'}<br>이미지 없음</div>`;

    let typeChip='';
    if(!isRelic) typeChip = item.passive===false
      ? '<span class="chip active">액티브</span>'
      : '<span class="chip passive">패시브</span>';

    const role = item.role ? `· ${item.role}` : '';
    const elem = item.element ? `· ${item.element}` : '';
    const cost = item.cost!=null ? `· nrg ${item.cost}` : '';

    return `
      <figure>
        <div class="frame ${rcls} ${!exists?'is-missing':''}">
          ${imgHtml}
          ${badge}
        </div>
        <div class="label">
          <div class="name">${item.icon||''} ${item.name}</div>
          <div class="meta"><span class="chip ${rcls}">${rname}</span>${typeChip}${role}${elem}${cost}</div>
          <div class="desc">${item.desc||''}</div>
          <div class="id">${id}</div>
        </div>
      </figure>`;
  }

  async function renderSection(title, items, isRelic){
    const groups = {};
    items.forEach(it=>{
      const r = it.rarity||'bronze';
      (groups[r]=groups[r]||[]).push(it);
    });
    const order = ['bronze','silver','gold','legendary','divine'];
    let html = `<h2>${title} (${items.length}장)</h2>`;
    for(const r of order){
      const list = groups[r]; if(!list) continue;
      const cards = await Promise.all(list.map(it=>renderCard(it,isRelic)));
      html += `<h3>${RARITY_NAME[r]} — ${r.toUpperCase()} (${list.length})</h3>`;
      html += `<div class="grid">${cards.join('')}</div>`;
    }
    return html;
  }

  (async function main(){
    const root = document.getElementById('render-root');
    const skills = RoF.Data.SKILLS || [];
    const relics = RoF.Data.RELICS || [];

    // 액티브/패시브 분리 후 유물까지 3섹션
    const actives  = skills.filter(s=>s.passive===false);
    const passives = skills.filter(s=>s.passive!==false);

    const [secA, secP, secR] = await Promise.all([
      renderSection('🔥 액티브 스펠',  actives, false),
      renderSection('🔰 패시브 스킬',  passives, false),
      renderSection('💎 유물',          relics, true),
    ]);
    root.innerHTML = secA + secP + secR;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-ok').textContent = ok;
    document.getElementById('stat-new').textContent = news;
    document.getElementById('stat-miss').textContent = miss;
  })();
})();
</script>
</body></html>
