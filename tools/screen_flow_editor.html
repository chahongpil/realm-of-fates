<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Realm of Fates — 화면 플로우 에디터</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #161922;
    --panel2: #1f2330;
    --line: #2a3040;
    --fg: #e7e9ee;
    --muted: #8a91a3;
    --accent: #ffd36a;
    --accent2: #7cc4ff;
    --danger: #ff6a6a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--fg); font-family: "Noto Sans KR", system-ui, sans-serif; font-size: 13px; }
  header { padding: 10px 14px; background: var(--panel); border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 15px; color: var(--accent); }
  header .hint { color: var(--muted); font-size: 11px; }
  button { background: var(--panel2); color: var(--fg); border: 1px solid var(--line); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  #status { color: var(--muted); font-size: 11px; margin-left: auto; }
  main { display: flex; height: calc(100vh - 48px); }
  #graph { flex: 1; background:
    radial-gradient(circle at 20% 30%, #13172020 1px, transparent 1px) 0 0 / 24px 24px,
    var(--bg);
    position: relative; overflow: hidden; cursor: grab; }
  #graph.panning { cursor: grabbing; }
  #svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  #nodes-layer { position: absolute; inset: 0; transform-origin: 0 0; pointer-events: none; }
  .node { position: absolute; pointer-events: auto; background: var(--panel); border: 2px solid var(--line); border-radius: 8px; padding: 8px 12px; min-width: 140px; cursor: grab; user-select: none; box-shadow: 0 2px 8px #0008; transition: border-color 0.15s; }
  .node:hover { border-color: var(--accent2); }
  .node.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent)33, 0 2px 8px #000c; }
  .node.dragging { cursor: grabbing; opacity: 0.9; }
  .node .title { font-weight: 600; color: var(--accent); font-size: 13px; }
  .node .id { font-size: 10px; color: var(--muted); font-family: ui-monospace, monospace; }
  .node .count { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .node.start { border-color: var(--accent); }
  aside { width: 300px; background: var(--panel); border-left: 1px solid var(--line); padding: 12px; overflow-y: auto; }
  aside h2 { font-size: 12px; color: var(--muted); margin: 6px 0 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  aside .field { margin-bottom: 8px; }
  aside .field label { display: block; color: var(--muted); font-size: 10px; margin-bottom: 2px; }
  aside .field input, aside .field textarea { width: 100%; background: var(--panel2); border: 1px solid var(--line); color: var(--fg); padding: 4px 6px; border-radius: 3px; font-size: 12px; font-family: inherit; }
  aside .field textarea { resize: vertical; min-height: 60px; }
  aside .edges-list { font-size: 11px; max-height: 240px; overflow-y: auto; }
  aside .edge-item { padding: 4px 6px; background: var(--panel2); margin-bottom: 3px; border-radius: 3px; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  aside .edge-item .arrow { color: var(--muted); }
  aside .edge-item .label { color: var(--accent2); font-size: 10px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  aside .empty { color: var(--muted); font-style: italic; font-size: 11px; }
  .legend { position: absolute; bottom: 10px; left: 10px; background: #0008; padding: 6px 10px; border-radius: 4px; font-size: 10px; color: var(--muted); pointer-events: none; }
  path.edge { fill: none; stroke: #4a5168; stroke-width: 1.5; marker-end: url(#arrow); }
  path.edge.highlighted { stroke: var(--accent); stroke-width: 2.5; }
  path.edge.from-selected { stroke: var(--accent2); stroke-width: 2; }

  /* Tree sidebar (left) */
  #tree-panel { width: 280px; background: var(--panel); border-right: 1px solid var(--line); display: flex; flex-direction: column; }
  #tree-panel.collapsed { width: 36px; }
  #tree-head { padding: 10px 12px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  #tree-panel.collapsed #tree-head span { display: none; }
  #tree-toggle { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 14px; padding: 0; }
  #tree-body { flex: 1; overflow-y: auto; padding: 8px 6px; font-size: 12px; }
  #tree-panel.collapsed #tree-body { display: none; }
  .tree-node { padding: 3px 4px; border-radius: 3px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
  .tree-node:hover { background: var(--panel2); }
  .tree-node.selected { background: #3a2e1a; color: var(--accent); }
  .tree-node.ref { color: var(--muted); font-style: italic; }
  .tree-node.ref:hover { background: #1a2230; }
  .tree-caret { display: inline-block; width: 12px; text-align: center; color: var(--muted); font-size: 9px; flex-shrink: 0; }
  .tree-caret.empty { visibility: hidden; }
  .tree-icon { font-size: 11px; flex-shrink: 0; }
  .tree-label { overflow: hidden; text-overflow: ellipsis; }
  .tree-children { margin-left: 14px; border-left: 1px dashed var(--line); padding-left: 6px; }
  .tree-children.hidden { display: none; }
  .tree-section { padding: 10px 6px 4px; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body>
<header>
  <h1>🗺️ 화면 플로우 에디터</h1>
  <button id="btn-parse" class="primary">🔄 index.html 파싱</button>
  <button id="btn-save">💾 저장</button>
  <button id="btn-load">📂 불러오기</button>
  <button id="btn-auto">✨ 자동 배치</button>
  <button id="btn-export">📤 JSON 내보내기</button>
  <span class="hint">드래그=이동 · 휠=줌 · 노드 클릭=선택 · 더블클릭=zone 편집기로</span>
  <span id="status"></span>
</header>
<main>
  <div id="tree-panel">
    <div id="tree-head">
      <button id="tree-toggle" title="접기/펼치기">◀</button>
      <span>📁 화면 트리</span>
    </div>
    <div id="tree-body"></div>
  </div>
  <div id="graph">
    <svg id="svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5168"/>
        </marker>
        <marker id="arrow-sel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffd36a"/>
        </marker>
      </defs>
      <g id="edges"></g>
    </svg>
    <div id="nodes-layer"></div>
    <div class="legend">노드 수: <span id="nc">0</span> · 엣지 수: <span id="ec">0</span> · 줌: <span id="zc">100%</span></div>
  </div>
  <aside>
    <h2>선택된 화면</h2>
    <div id="detail-empty" class="empty">노드를 클릭하세요</div>
    <div id="detail" style="display:none;">
      <div class="field">
        <label>ID</label>
        <input id="d-id" readonly>
      </div>
      <div class="field">
        <label>제목 (한국어)</label>
        <input id="d-title">
      </div>
      <div class="field">
        <label>설명</label>
        <textarea id="d-desc" placeholder="이 화면의 역할 / 진입 조건 / 주요 인터랙션..."></textarea>
      </div>
      <h2>나가는 전환 (out)</h2>
      <div id="d-edges-out" class="edges-list"></div>
      <h2>들어오는 전환 (in)</h2>
      <div id="d-edges-in" class="edges-list"></div>
      <div style="margin-top:10px; display:flex; gap:6px;">
        <button id="btn-open-zone">🎨 Zone 편집</button>
        <button id="btn-open-game">🎮 게임에서 열기</button>
      </div>
    </div>
  </aside>
</main>

<script>
// ──────────────────────────────────────────────────────────────
// State
// ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'rof_screen_flow_v1';
const state = {
  nodes: {},       // id -> {id, title, desc, x, y}
  edges: [],       // {from, to, label}
  selected: null,
  pan: { x: 0, y: 0 },
  zoom: 1,
};

const KOREAN_TITLES = {
  'title-screen':      '타이틀',
  'login-screen':      '로그인',
  'signup-screen':     '회원가입',
  'prologue-screen':   '프롤로그',
  'char-element-screen':'원소 선택 (Step 1)',    // 2026-04-13: char-select 2-screen split
  'char-hero-screen':   '영웅 선택 (Step 2)',
  'menu-screen':        '메인 허브',
  'tavern-screen':     '선술집 (용병 / 영웅 탭)',  // 단일 DOM, tav-tab-unit/hero 로 콘텐츠 토글
  'upgrade-screen':    '단련소(구)',
  'deckview-screen':   '전력 열람',
  'castle-screen':     '성채',
  'church-screen':     '신전',
  'match-screen':      '매치메이킹',
  'cardselect-screen': '출정 편성',
  'formation-screen':  '진형 배치',
  'battle-screen':     '전투',
  'choice-screen':     '라운드 선택',
  'pick-screen':       '동료 뽑기',
  'reward-screen':     '보상',
  'gameover-screen':   '게임오버',
};

// action → target screen id (heuristic map for non-ui.show actions)
const ACTION_TO_SCREEN = {
  'game.showMenu':           'menu-screen',
  'game.showTavern':         'tavern-screen',
  'game.showTavernUnit':     'tavern-screen',
  'game.showTavernHero':     'tavern-screen',
  'game.refreshTavern':      'tavern-screen',
  'game.showDeckView':       'deckview-screen',
  'game.showDeckTab':        'deckview-screen',
  'game.showCodexTab':       'deckview-screen',
  'game.showCastle':         'castle-screen',
  'game.showCastleUpgradeTab':'castle-screen',
  'game.showCastleQuestTab': 'castle-screen',
  'game.showChurch':         'church-screen',
  'game.showMatchmaking':    'match-screen',
  'game.startBattle':         'cardselect-screen',   // 성문 클릭 → 편성
  'game.confirmCardSelect':   'match-screen',         // 출정편성 확정 → 매치메이킹
  'game.startBattleFromMatch':'battle-screen',        // 매치 확정 → 전투
  'game.saveFormation':       'cardselect-screen',
  'game.loadFormation':       'cardselect-screen',
  'game.doRoundChoice':       'pick-screen',          // 라운드 선택지 클릭 → 뽑기
  'game.finishPick':          'battle-screen',        // 뽑기 확정 → 다음 라운드(전투)
  'game.rerollPick':          'pick-screen',
  'game.afterBattle':         'menu-screen',          // 보상 수령 → 마을
  'game.newRun':              'char-select-screen',
  'game.logout':             'title-screen',
  'auth.login':              'menu-screen',
  'auth.signup':             'prologue-screen',
  'auth.endPrologue':        'char-element-screen',
  'auth.skipPrologue':       'char-element-screen',
  'auth.confirmElement':     'char-hero-screen',
  'auth.confirmHero':        'menu-screen',
  'auth.backToPrologue':     'prologue-screen',
  'auth.backToElement':      'char-element-screen',
  // Legacy aliases
  'auth.confirmChar':        'menu-screen',
  'auth.charBack':           'char-element-screen',
  'formation.auto':          'formation-screen',
  'formation.confirm':       'battle-screen',
  'turnBattle.startCombat':  'battle-screen',
  'turnBattle.goBack':       'formation-screen',
};

// ──────────────────────────────────────────────────────────────
// Parser
// ──────────────────────────────────────────────────────────────
async function parseIndexHtml() {
  setStatus('index.html 불러오는 중...');
  const res = await fetch('../index.html');
  if (!res.ok) throw new Error('index.html fetch 실패: ' + res.status);
  const html = await res.text();
  const doc = new DOMParser().parseFromString(html, 'text/html');

  const newNodes = {};
  const newEdges = [];

  // 1) 화면 노드 수집
  doc.querySelectorAll('[id$="-screen"]').forEach(el => {
    const id = el.id;
    const existing = state.nodes[id];
    newNodes[id] = {
      id,
      title: (existing && existing.title) || KOREAN_TITLES[id] || id,
      desc: (existing && existing.desc) || '',
      x: (existing && existing.x) != null ? existing.x : 0,
      y: (existing && existing.y) != null ? existing.y : 0,
    };
  });

  // 2) 각 화면 안의 버튼을 스캔해서 엣지 생성
  Object.keys(newNodes).forEach(fromId => {
    const screenEl = doc.getElementById(fromId);
    if (!screenEl) return;
    screenEl.querySelectorAll('[data-action]').forEach(btn => {
      const action = btn.getAttribute('data-action');
      const arg = btn.getAttribute('data-arg');
      const label = (btn.textContent || '').trim().replace(/\s+/g, ' ').slice(0, 24);

      let toId = null;
      if (action === 'ui.show' && arg) {
        toId = arg; // directly points to screen id
      } else if (ACTION_TO_SCREEN[action]) {
        toId = ACTION_TO_SCREEN[action];
      }
      if (!toId || !newNodes[toId]) return;
      if (toId === fromId) return; // self-loop skip
      newEdges.push({ from: fromId, to: toId, label: label || action });
    });
  });

  // 2.5) char-select 는 이제 실제 DOM 2 스크린 (char-element-screen + char-hero-screen).
  //      가상 주입 불필요 — 파서가 [id$="-screen"] 스캔으로 자동 발견.

  // 2.6) (삭제됨) tavern-hero 가상 노드 — 2026-04-13 롤백.
  //      char-select 와 동일한 이유: DOM 은 #tavern-screen 하나, 탭 버튼으로 콘텐츠 교체.
  //      라벨 "(용병 / 영웅 탭)" 로 두 상태 암시.

  // 2.7) 내부 전환 엣지 (data-action 없이 JS 내부에서 UI.show 호출되는 플로우)
  //    battle → choice: 라운드 종료 시 showRoundChoice()
  //    choice → battle: _revealAndFinish() 로 다음 라운드 시작 (pick 미경유 케이스)
  //    battle → reward: showBattleEnd() (HP=0 또는 승리)
  //    reward → menu: afterBattle (이미 ACTION_TO_SCREEN 에 있음 → reward의 버튼에서 엣지 생성)
  //    formation → battle: 라운드 간 편성 조정 후 복귀
  const syntheticInternal = [
    ['battle-screen',  'choice-screen',  '라운드 종료'],
    ['battle-screen',  'reward-screen',  '전투 종료 (승/패)'],
    ['choice-screen',  'battle-screen',  '즉시 다음 라운드'],
    ['formation-screen','battle-screen', '편성 재조정 완료'],
  ];
  syntheticInternal.forEach(([f, t, lbl]) => {
    if (newNodes[f] && newNodes[t]) newEdges.push({ from: f, to: t, label: lbl });
  });

  // 3) 위치가 없는 노드는 자동 배치
  const unplaced = Object.values(newNodes).filter(n => n.x === 0 && n.y === 0);
  if (unplaced.length === Object.keys(newNodes).length) {
    // 전체 fresh → 완전 자동 배치
    autoLayout(newNodes, newEdges);
  } else if (unplaced.length > 0) {
    // 일부만 새 노드 (예: index.html 에 스크린이 추가됨) → 새 노드만 tier 기준 배치
    // localStorage 에 저장된 기존 좌표는 건드리지 않음.
    placeUnplaced(unplaced, newNodes);
  }

  state.nodes = newNodes;
  state.edges = newEdges;
  render();
  setStatus(`파싱 완료 · 노드 ${Object.keys(newNodes).length}개 · 엣지 ${newEdges.length}개`);
}

// ──────────────────────────────────────────────────────────────
// Auto layout: 계층 배치 (title → menu → gameplay)
// ──────────────────────────────────────────────────────────────
const TIERS = {
  'title-screen': 0,
  'login-screen': 1, 'signup-screen': 1,
  'prologue-screen': 2,
  'char-element-screen': 3,
  'char-hero-screen': 3,
  'menu-screen': 4,
  'tavern-screen': 5, 'deckview-screen': 5, 'castle-screen': 5, 'church-screen': 5, 'upgrade-screen': 5,
  'match-screen': 6,
  'cardselect-screen': 7,
  'formation-screen': 8,
  'battle-screen': 9,
  'choice-screen': 10,
  'pick-screen': 11,
  'reward-screen': 12,
  'gameover-screen': 13,
};
const COL_W = 220;
const ROW_H = 110;

function autoLayout(nodes, edges) {
  const tierMap = {};
  Object.values(nodes).forEach(n => {
    const t = TIERS[n.id] != null ? TIERS[n.id] : 99;
    if (!tierMap[t]) tierMap[t] = [];
    tierMap[t].push(n);
  });
  const tiers = Object.keys(tierMap).map(Number).sort((a, b) => a - b);
  tiers.forEach((t, ti) => {
    const col = tierMap[t];
    col.forEach((n, i) => {
      n.x = 60 + ti * COL_W;
      n.y = 60 + i * ROW_H + (ti % 2) * 20;
    });
  });
}

/**
 * index.html 에 새 스크린이 추가된 경우, 기존에 배치된 노드는 건드리지 않고
 * 새로 들어온 unplaced 노드만 같은 tier 의 빈 row 에 끼워 넣는다.
 */
function placeUnplaced(unplaced, allNodes) {
  // tier 별로 이미 배치된 노드의 y 좌표들을 수집 → 다음 빈 row 계산
  const occupiedY = {}; // tierIndex → Set(rowIndex)
  Object.values(allNodes).forEach(n => {
    if (n.x === 0 && n.y === 0) return;
    const t = TIERS[n.id] != null ? TIERS[n.id] : 99;
    const rowIdx = Math.round((n.y - 60 - (t % 2) * 20) / ROW_H);
    if (!occupiedY[t]) occupiedY[t] = new Set();
    occupiedY[t].add(rowIdx);
  });
  unplaced.forEach(n => {
    const t = TIERS[n.id] != null ? TIERS[n.id] : 99;
    if (!occupiedY[t]) occupiedY[t] = new Set();
    let row = 0;
    while (occupiedY[t].has(row)) row++;
    occupiedY[t].add(row);
    n.x = 60 + t * COL_W;
    n.y = 60 + row * ROW_H + (t % 2) * 20;
  });
}

// ──────────────────────────────────────────────────────────────
// Rendering
// ──────────────────────────────────────────────────────────────
const layer = document.getElementById('nodes-layer');
const svg = document.getElementById('svg');
const edgesG = document.getElementById('edges');

function render() {
  renderTree();
  // Nodes
  layer.innerHTML = '';
  Object.values(state.nodes).forEach(n => {
    const el = document.createElement('div');
    el.className = 'node' + (state.selected === n.id ? ' selected' : '') + (n.id === 'title-screen' ? ' start' : '');
    el.dataset.id = n.id;
    el.style.left = n.x + 'px';
    el.style.top = n.y + 'px';
    const outCount = state.edges.filter(e => e.from === n.id).length;
    const inCount = state.edges.filter(e => e.to === n.id).length;
    el.innerHTML = `
      <div class="title">${n.title}</div>
      <div class="id">${n.id}</div>
      <div class="count">↓${outCount} ↑${inCount}</div>`;
    layer.appendChild(el);
  });
  applyTransform();
  renderEdges();
  document.getElementById('nc').textContent = Object.keys(state.nodes).length;
  document.getElementById('ec').textContent = state.edges.length;
}

function renderEdges() {
  edgesG.innerHTML = '';
  // 중복 엣지 (같은 from→to) 묶어서 표시
  const seen = new Set();
  state.edges.forEach(e => {
    const key = e.from + '→' + e.to;
    if (seen.has(key)) return;
    seen.add(key);
    const a = state.nodes[e.from];
    const b = state.nodes[e.to];
    if (!a || !b) return;
    const ax = (a.x + 80) * state.zoom + state.pan.x;
    const ay = (a.y + 30) * state.zoom + state.pan.y;
    const bx = (b.x + 80) * state.zoom + state.pan.x;
    const by = (b.y + 30) * state.zoom + state.pan.y;
    const dx = bx - ax;
    const cx1 = ax + dx * 0.5;
    const cx2 = bx - dx * 0.5;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${ax} ${ay} C ${cx1} ${ay}, ${cx2} ${by}, ${bx} ${by}`);
    path.setAttribute('class', 'edge' + (state.selected && (e.from === state.selected || e.to === state.selected) ? ' from-selected' : ''));
    if (state.selected && (e.from === state.selected || e.to === state.selected)) {
      path.setAttribute('marker-end', 'url(#arrow-sel)');
    }
    edgesG.appendChild(path);
  });
}

// ──────────────────────────────────────────────────────────────
// Tree (left sidebar) — BFS spanning tree with cycle refs
// ──────────────────────────────────────────────────────────────
const TREE_ROOT_ORDER = ['title-screen', 'login-screen', 'signup-screen'];
const collapsed = new Set(); // ids collapsed in tree
const treeBody = document.getElementById('tree-body');

function buildSpanningTree() {
  // BFS from primary roots; first visit claims the node
  const parent = {};           // childId -> parentId (first visit)
  const children = {};         // id -> [childId...]
  const visited = new Set();
  const queue = [];

  const roots = TREE_ROOT_ORDER.filter(id => state.nodes[id]);
  // include any other node that has zero incoming edges as additional root
  Object.keys(state.nodes).forEach(id => {
    if (roots.includes(id)) return;
    const hasIn = state.edges.some(e => e.to === id);
    if (!hasIn) roots.push(id);
  });

  roots.forEach(r => { visited.add(r); queue.push(r); children[r] = []; parent[r] = null; });

  while (queue.length) {
    const cur = queue.shift();
    const outs = state.edges.filter(e => e.from === cur);
    // uniq by target
    const seenT = new Set();
    outs.forEach(e => {
      if (seenT.has(e.to)) return;
      seenT.add(e.to);
      if (!state.nodes[e.to]) return;
      if (!visited.has(e.to)) {
        visited.add(e.to);
        parent[e.to] = cur;
        children[cur] = children[cur] || [];
        children[cur].push({ id: e.to, label: e.label, ref: false });
        queue.push(e.to);
        children[e.to] = children[e.to] || [];
      } else {
        // cycle / cross-edge → show as ref leaf
        children[cur] = children[cur] || [];
        children[cur].push({ id: e.to, label: e.label, ref: true });
      }
    });
  }

  // Unreached screens (no path from roots) → orphan section
  const orphans = Object.keys(state.nodes).filter(id => !visited.has(id));
  return { roots, children, orphans };
}

function renderTree() {
  const { roots, children, orphans } = buildSpanningTree();
  treeBody.innerHTML = '';
  const section = (title) => {
    const d = document.createElement('div');
    d.className = 'tree-section';
    d.textContent = title;
    treeBody.appendChild(d);
  };
  section('🎯 플레이어 여정');
  roots.forEach(r => treeBody.appendChild(renderTreeNode(r, children, null, 0, new Set())));
  if (orphans.length) {
    section('⚠️ 고립 화면 (도달 경로 없음)');
    orphans.forEach(id => treeBody.appendChild(renderTreeNode(id, {}, null, 0, new Set())));
  }
}

function renderTreeNode(id, childrenMap, edgeLabel, depth, ancestors) {
  const n = state.nodes[id];
  if (!n) return document.createTextNode('');
  const wrap = document.createElement('div');
  const kids = (childrenMap[id] || []).filter(c => !ancestors.has(c.id));
  const isCollapsed = collapsed.has(id);

  const row = document.createElement('div');
  row.className = 'tree-node' + (state.selected === id ? ' selected' : '');
  row.title = id + (edgeLabel ? ` — 버튼: ${edgeLabel}` : '');

  const caret = document.createElement('span');
  caret.className = 'tree-caret' + (kids.length ? '' : ' empty');
  caret.textContent = kids.length ? (isCollapsed ? '▶' : '▼') : '·';
  caret.onclick = (ev) => { ev.stopPropagation(); if (isCollapsed) collapsed.delete(id); else collapsed.add(id); renderTree(); };
  row.appendChild(caret);

  const icon = document.createElement('span');
  icon.className = 'tree-icon';
  icon.textContent = id === 'title-screen' ? '🏰' : (id.includes('battle') ? '⚔️' : (id.includes('gameover') ? '💀' : '📄'));
  row.appendChild(icon);

  const label = document.createElement('span');
  label.className = 'tree-label';
  label.textContent = n.title;
  row.appendChild(label);

  row.onclick = () => selectNode(id);
  row.ondblclick = () => openZoneEditor(id);
  wrap.appendChild(row);

  if (kids.length && !isCollapsed) {
    const kidsEl = document.createElement('div');
    kidsEl.className = 'tree-children';
    const nextAnc = new Set(ancestors); nextAnc.add(id);
    kids.forEach(c => {
      if (c.ref) {
        const refRow = document.createElement('div');
        refRow.className = 'tree-node ref';
        refRow.title = '순환 참조 → ' + c.id + (c.label ? ` (${c.label})` : '');
        refRow.innerHTML = `<span class="tree-caret empty">·</span><span class="tree-icon">↩︎</span><span class="tree-label">${escapeHtml(state.nodes[c.id]?.title || c.id)}</span>`;
        refRow.onclick = () => selectNode(c.id);
        kidsEl.appendChild(refRow);
      } else {
        kidsEl.appendChild(renderTreeNode(c.id, childrenMap, c.label, depth + 1, nextAnc));
      }
    });
    wrap.appendChild(kidsEl);
  }
  return wrap;
}

// Toggle collapse of the whole tree panel
document.getElementById('tree-toggle').onclick = () => {
  const p = document.getElementById('tree-panel');
  p.classList.toggle('collapsed');
  document.getElementById('tree-toggle').textContent = p.classList.contains('collapsed') ? '▶' : '◀';
};

function applyTransform() {
  layer.style.transform = `translate(${state.pan.x}px, ${state.pan.y}px) scale(${state.zoom})`;
  document.getElementById('zc').textContent = Math.round(state.zoom * 100) + '%';
}

// ──────────────────────────────────────────────────────────────
// Interaction: drag nodes, pan graph, zoom
// ──────────────────────────────────────────────────────────────
const graphEl = document.getElementById('graph');
let drag = null;

layer.addEventListener('mousedown', (ev) => {
  const nodeEl = ev.target.closest('.node');
  if (!nodeEl) return;
  ev.stopPropagation();
  const id = nodeEl.dataset.id;
  selectNode(id);
  drag = { id, startX: ev.clientX, startY: ev.clientY, nodeX: state.nodes[id].x, nodeY: state.nodes[id].y };
  nodeEl.classList.add('dragging');
});

layer.addEventListener('dblclick', (ev) => {
  const nodeEl = ev.target.closest('.node');
  if (!nodeEl) return;
  openZoneEditor(nodeEl.dataset.id);
});

graphEl.addEventListener('mousedown', (ev) => {
  if (ev.target.closest('.node')) return;
  drag = { pan: true, startX: ev.clientX, startY: ev.clientY, panX: state.pan.x, panY: state.pan.y };
  graphEl.classList.add('panning');
});

window.addEventListener('mousemove', (ev) => {
  if (!drag) return;
  if (drag.pan) {
    state.pan.x = drag.panX + (ev.clientX - drag.startX);
    state.pan.y = drag.panY + (ev.clientY - drag.startY);
    applyTransform();
    renderEdges();
  } else if (drag.id) {
    const n = state.nodes[drag.id];
    n.x = drag.nodeX + (ev.clientX - drag.startX) / state.zoom;
    n.y = drag.nodeY + (ev.clientY - drag.startY) / state.zoom;
    const el = layer.querySelector(`[data-id="${drag.id}"]`);
    if (el) { el.style.left = n.x + 'px'; el.style.top = n.y + 'px'; }
    renderEdges();
  }
});

window.addEventListener('mouseup', () => {
  if (!drag) return;
  if (drag.id) {
    const el = layer.querySelector(`[data-id="${drag.id}"]`);
    if (el) el.classList.remove('dragging');
  }
  graphEl.classList.remove('panning');
  drag = null;
});

graphEl.addEventListener('wheel', (ev) => {
  ev.preventDefault();
  const delta = ev.deltaY < 0 ? 1.1 : 0.9;
  const newZoom = Math.max(0.3, Math.min(2.5, state.zoom * delta));
  // zoom around cursor
  const rect = graphEl.getBoundingClientRect();
  const cx = ev.clientX - rect.left;
  const cy = ev.clientY - rect.top;
  state.pan.x = cx - (cx - state.pan.x) * (newZoom / state.zoom);
  state.pan.y = cy - (cy - state.pan.y) * (newZoom / state.zoom);
  state.zoom = newZoom;
  applyTransform();
  renderEdges();
}, { passive: false });

// ──────────────────────────────────────────────────────────────
// Selection / detail panel
// ──────────────────────────────────────────────────────────────
function selectNode(id) {
  state.selected = id;
  render();
  const n = state.nodes[id];
  document.getElementById('detail-empty').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  document.getElementById('d-id').value = n.id;
  document.getElementById('d-title').value = n.title;
  document.getElementById('d-desc').value = n.desc || '';

  const outs = state.edges.filter(e => e.from === id);
  const ins = state.edges.filter(e => e.to === id);
  const outHtml = outs.length
    ? outs.map(e => `<div class="edge-item"><span class="label">${escapeHtml(e.label)}</span><span class="arrow">→</span><span>${state.nodes[e.to]?.title || e.to}</span></div>`).join('')
    : '<div class="empty">(없음)</div>';
  const inHtml = ins.length
    ? ins.map(e => `<div class="edge-item"><span>${state.nodes[e.from]?.title || e.from}</span><span class="arrow">→</span><span class="label">${escapeHtml(e.label)}</span></div>`).join('')
    : '<div class="empty">(없음)</div>';
  document.getElementById('d-edges-out').innerHTML = outHtml;
  document.getElementById('d-edges-in').innerHTML = inHtml;
}

document.getElementById('d-title').addEventListener('input', (ev) => {
  if (!state.selected) return;
  state.nodes[state.selected].title = ev.target.value;
  const el = layer.querySelector(`[data-id="${state.selected}"] .title`);
  if (el) el.textContent = ev.target.value;
});
document.getElementById('d-desc').addEventListener('input', (ev) => {
  if (!state.selected) return;
  state.nodes[state.selected].desc = ev.target.value;
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ──────────────────────────────────────────────────────────────
// Buttons
// ──────────────────────────────────────────────────────────────
function openZoneEditor(id) {
  const shortId = id.replace('-screen', '');
  window.open(`screen_editor_zones.html?screen=${shortId}`, '_blank');
}
function openInGame(id) {
  const shortId = id.replace('-screen', '');
  window.open(`../index.html?autonav=${shortId}`, '_blank');
}
document.getElementById('btn-open-zone').onclick = () => state.selected && openZoneEditor(state.selected);
document.getElementById('btn-open-game').onclick = () => state.selected && openInGame(state.selected);

document.getElementById('btn-parse').onclick = () => parseIndexHtml().catch(e => setStatus('❌ ' + e.message));
document.getElementById('btn-save').onclick = () => {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ nodes: state.nodes, edges: state.edges }));
  setStatus('✅ 로컬 저장 완료 (' + new Date().toLocaleTimeString() + ')');
};
document.getElementById('btn-load').onclick = () => {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) { setStatus('저장된 데이터 없음'); return; }
  try {
    const d = JSON.parse(raw);
    state.nodes = d.nodes || {};
    state.edges = d.edges || [];
    render();
    setStatus('📂 로컬에서 불러옴 · 노드 ' + Object.keys(state.nodes).length);
  } catch(e) { setStatus('❌ 파싱 실패'); }
};
document.getElementById('btn-auto').onclick = () => {
  autoLayout(state.nodes, state.edges);
  render();
  setStatus('자동 배치 완료');
};
document.getElementById('btn-export').onclick = () => {
  const data = JSON.stringify({ nodes: state.nodes, edges: state.edges }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'screen_flow.json';
  a.click();
  setStatus('📤 screen_flow.json 다운로드');
};

function setStatus(msg) { document.getElementById('status').textContent = msg; }

// ──────────────────────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────────────────────
// 저장된 게 있으면 먼저 로드, 없으면 파싱
(function init() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const d = JSON.parse(raw);
      state.nodes = d.nodes || {};
      state.edges = d.edges || [];
      render();
      setStatus('📂 로컬 저장본 로드 · "🔄 index.html 파싱" 으로 최신화');
      return;
    } catch(e) {}
  }
  parseIndexHtml().catch(e => setStatus('❌ ' + e.message));
})();
</script>
